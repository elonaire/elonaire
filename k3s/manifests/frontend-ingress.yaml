# HTTP — redirect only
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend-ingress-http
  namespace: techietenka
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: "techietenka-redirect-to-https@kubernetescrd"
spec:
  ingressClassName: traefik
  rules:
    - host: techietenka.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 8080
---
# HTTPS — serve content
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend-ingress
  namespace: techietenka
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.middlewares: "techietenka-surrealist-ipallowlist@kubernetescrd,techietenka-security-headers@kubernetescrd"
    traefik.ingress.kubernetes.io/router.tls.options: "default-default@kubernetescrd"
spec:
  ingressClassName: traefik
  rules:
    - host: techietenka.com
      http:
        paths:
          - path: /api/acl
            pathType: Prefix
            backend:
              service:
                name: acl-service
                port:
                  number: 3007
          - path: /api/files
            pathType: Prefix
            backend:
              service:
                name: files-service
                port:
                  number: 3001
          - path: /api/shared
            pathType: Prefix
            backend:
              service:
                name: shared-service
                port:
                  number: 3002
          - path: /api/payments
            pathType: Prefix
            backend:
              service:
                name: payments-service
                port:
                  number: 3013
          - path: /api/email
            pathType: Prefix
            backend:
              service:
                name: email-service
                port:
                  number: 3019
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 8080
  tls:
    - hosts:
        - techietenka.com
      secretName: techietenka-main-tls
